    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Header */
    #header { padding: 9px 16px; background: rgba(0,0,0,0.6); border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; flex-shrink: 0; min-height: 42px; }
    #session-label { font-weight: 700; color: #a78bfa; font-size: 0.82rem; white-space: nowrap; }
    #date-label { font-size: 0.72rem; color: #475569; white-space: nowrap; background: #1e293b; padding: 1px 6px; border-radius: 4px; }
    #img-label { font-size: 0.85rem; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #counter { font-size: 0.8rem; color: #64748b; white-space: nowrap; }
    #hint { font-size: 0.68rem; color: #334155; white-space: nowrap; }

    /* Layout */
    #main { flex: 1; display: flex; overflow: hidden; }

    /* Sidebar */
    #sidebar { width: 172px; flex-shrink: 0; background: rgba(0,0,0,0.45); border-right: 1px solid #1e293b; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #1e293b transparent; }
    .session-btn { width: 100%; padding: 8px 11px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: none; background: none; color: #94a3b8; font-size: 0.76rem; text-align: left; border-bottom: 1px solid #1e293b; transition: background 0.15s, color 0.15s; gap: 6px; }
    .session-btn:hover { background: rgba(167,139,250,0.07); color: #e2e8f0; }
    .session-btn.active { background: rgba(167,139,250,0.12); color: #a78bfa; border-left: 3px solid #a78bfa; }
    .session-btn .s-date { font-size: 0.64rem; color: #475569; display: block; }
    .session-btn .s-name { font-weight: 600; display: block; line-height: 1.3; word-break: break-word; }
    .session-btn .s-count { background: #1e293b; color: #64748b; font-size: 0.64rem; padding: 1px 5px; border-radius: 9px; flex-shrink: 0; }
    .session-btn.active .s-count { background: rgba(167,139,250,0.2); color: #a78bfa; }

    /* Viewer */
    #viewer { flex: 1; position: relative; overflow: hidden; background: #0f172a; cursor: grab; }
    #viewer.dragging { cursor: grabbing; }
    #main-img { position: absolute; left: 0; top: 0; transform-origin: 0 0; will-change: transform; max-width: none; max-height: none; transition: opacity 0.15s; pointer-events: none; }
    #scale-badge { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.65); color: #64748b; font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; pointer-events: none; z-index: 5; }

    /* Nav buttons */
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; font-size: 1.3rem; width: 40px; height: 72px; cursor: pointer; border-radius: 7px; z-index: 10; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
    .nav-btn:hover { background: rgba(255,255,255,0.18); }
    #prev-btn { left: 8px; }
    #next-btn { right: 8px; }

    /* Thumbnails */
    #thumbnails { display: flex; gap: 5px; padding: 7px 10px; background: rgba(0,0,0,0.55); border-top: 1px solid #1e293b; overflow-x: auto; flex-shrink: 0; scrollbar-width: thin; scrollbar-color: #1e293b transparent; }
    .thumb { width: 64px; height: 42px; object-fit: cover; border-radius: 3px; cursor: pointer; opacity: 0.38; border: 2px solid transparent; transition: opacity 0.15s, border-color 0.15s; flex-shrink: 0; }
    .thumb.active { opacity: 1; border-color: #a78bfa; }
    .thumb:hover:not(.active) { opacity: 0.72; }

    /* ── Autoplay ── */
    #progress-bar { height: 3px; background: linear-gradient(90deg, #a78bfa, #c4b5fd); width: 0%; flex-shrink: 0; display: none; }
    #autoplay-wrap { position: relative; display: flex; align-items: center; flex-shrink: 0; }
    #play-btn { padding: 4px 12px; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.25); color: #c4b5fd; font-size: 0.72rem; cursor: pointer; border-radius: 6px 0 0 6px; white-space: nowrap; transition: background 0.15s; }
    #play-btn:hover, #play-btn.playing { background: rgba(167,139,250,0.18); }
    #dd-toggle { padding: 4px 7px; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.25); border-left: none; color: #c4b5fd; font-size: 0.72rem; cursor: pointer; border-radius: 0 6px 6px 0; transition: background 0.15s; }
    #dd-toggle:hover { background: rgba(167,139,250,0.18); }
    #auto-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 6px 0; min-width: 130px; z-index: 100; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    #auto-dropdown.open { display: block; }
    .dd-speed { padding: 7px 16px 7px 32px; font-size: 0.75rem; color: #94a3b8; cursor: pointer; position: relative; transition: background 0.12s; }
    .dd-speed:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
    .dd-speed.active { color: #a78bfa; }
    .dd-speed.active::before { content: '✓'; position: absolute; left: 14px; color: #a78bfa; }
    .dd-divider { height: 1px; background: #334155; margin: 4px 0; }
    .dd-loop { padding: 7px 16px; font-size: 0.75rem; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.12s; }
    .dd-loop:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
    .loop-check { width: 14px; height: 14px; border: 1.5px solid #475569; border-radius: 3px; flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; }
    .dd-loop.active { color: #a78bfa; }
    .dd-loop.active .loop-check { border-color: #a78bfa; background: rgba(167,139,250,0.15); }
    .dd-loop.active .loop-check::after { content: '✓'; font-size: 0.65rem; color: #a78bfa; }
  </style>
</head>

// ── State ──────────────────────────────────────────────────
let sIdx = 0, iIdx = 0;
let scale = 1, tx = 0, ty = 0;
let dragging = false, dragX = 0, dragY = 0, txStart = 0, tyStart = 0;

// ── Elements ───────────────────────────────────────────────
const img          = document.getElementById('main-img');
const viewer       = document.getElementById('viewer');
const sidebar      = document.getElementById('sidebar');
const thumbsEl     = document.getElementById('thumbnails');
const sessionLabel = document.getElementById('session-label');
const dateLabel    = document.getElementById('date-label');
const imgLabel     = document.getElementById('img-label');
const counter      = document.getElementById('counter');
const badge        = document.getElementById('scale-badge');

// ── Build sidebar ──────────────────────────────────────────
SESSIONS.forEach((s, si) => {
  const btn = document.createElement('button');
  btn.className = 'session-btn' + (si === 0 ? ' active' : '');
  btn.innerHTML = `<span><span class="s-date">${s.date}</span><span class="s-name">${s.slug}</span></span><span class="s-count">${s.images.length}</span>`;
  btn.addEventListener('click', () => loadSession(si, 0));
  sidebar.appendChild(btn);
});

// ── Transform ──────────────────────────────────────────────
function applyTransform() {
  img.style.transform = `matrix(${scale},0,0,${scale},${tx},${ty})`;
  badge.textContent = Math.round(scale * 100) + '%';
}
function fitImage() {
  const vw = viewer.clientWidth, vh = viewer.clientHeight;
  const iw = img.naturalWidth,   ih = img.naturalHeight;
  if (!iw || !ih) return;
  scale = Math.min((vw - 40) / iw, (vh - 40) / ih);
  tx = (vw - iw * scale) / 2;
  ty = (vh - ih * scale) / 2;
  applyTransform();
}

// ── Load session ───────────────────────────────────────────
function loadSession(si, ii) {
  stopAutoplay();
  sIdx = si;
  document.querySelectorAll('.session-btn').forEach((b, i) => b.classList.toggle('active', i === si));
  thumbsEl.innerHTML = '';
  SESSIONS[si].images.forEach((item, i) => {
    const t = document.createElement('img');
    t.src = item.f; t.className = 'thumb' + (i === ii ? ' active' : ''); t.title = item.l;
    t.addEventListener('click', () => showImage(si, i));
    thumbsEl.appendChild(t);
  });
  showImage(si, ii);
}

// ── Show image ─────────────────────────────────────────────
function showImage(si, ii) {
  sIdx = si;
  iIdx = ((ii % SESSIONS[si].images.length) + SESSIONS[si].images.length) % SESSIONS[si].images.length;
  const item = SESSIONS[si].images[iIdx];

  img.style.opacity = '0';
  img.src = item.f;
  img.onload = () => { fitImage(); img.style.opacity = '1'; };

  sessionLabel.textContent = SESSIONS[si].slug;
  dateLabel.textContent    = SESSIONS[si].date;
  imgLabel.textContent     = item.l;
  counter.textContent      = `${iIdx + 1} / ${SESSIONS[si].images.length}`;

  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === iIdx);
    if (i === iIdx) t.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  });
  resetAutoTimer();
}

loadSession(0, 0);

// ── Keyboard ───────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight')             showImage(sIdx, iIdx + 1);
  else if (e.key === 'ArrowLeft')         showImage(sIdx, iIdx - 1);
  else if (e.key === 'Escape' || e.key === '0') fitImage();
  else if (e.key === ' ') { e.preventDefault(); autoTimer ? stopAutoplay() : startAutoplay(); }
});
document.getElementById('prev-btn').addEventListener('click', () => showImage(sIdx, iIdx - 1));
document.getElementById('next-btn').addEventListener('click', () => showImage(sIdx, iIdx + 1));

// ── Scroll zoom ────────────────────────────────────────────
viewer.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.13 : 1/1.13;
  const ns = Math.min(Math.max(scale * factor, 0.1), 25);
  const vr = viewer.getBoundingClientRect();
  const cx = e.clientX - vr.left, cy = e.clientY - vr.top;
  tx = cx - (cx - tx) * (ns / scale);
  ty = cy - (cy - ty) * (ns / scale);
  scale = ns; applyTransform();
}, { passive: false });

// ── Drag pan ───────────────────────────────────────────────
viewer.addEventListener('mousedown', e => {
  if (e.button !== 0 || e.target.classList.contains('nav-btn')) return;
  dragging = true; dragX = e.clientX; dragY = e.clientY; txStart = tx; tyStart = ty;
  viewer.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = txStart + (e.clientX - dragX); ty = tyStart + (e.clientY - dragY); applyTransform();
});
document.addEventListener('mouseup', () => { dragging = false; viewer.classList.remove('dragging'); });

viewer.addEventListener('dblclick', fitImage);
window.addEventListener('resize', fitImage);

// ── Autoplay ───────────────────────────────────────────────
const playBtn  = document.getElementById('play-btn');
const ddToggle = document.getElementById('dd-toggle');
const ddMenu   = document.getElementById('auto-dropdown');
const loopItem = document.getElementById('loop-item');
const progBar  = document.getElementById('progress-bar');

let autoSpeed = 5000, autoLoop = true, autoTimer = null, progTimer = null, progStart = 0;

function startAutoplay() {
  clearInterval(autoTimer); clearInterval(progTimer);
  progStart = Date.now();
  autoTimer = setInterval(autoAdvance, autoSpeed);
  progTimer = setInterval(updateProgress, 50);
  progBar.style.display = 'block'; progBar.style.width = '0%';
  playBtn.textContent = '⏸ 暫停'; playBtn.classList.add('playing');
}
function stopAutoplay() {
  clearInterval(autoTimer); clearInterval(progTimer); autoTimer = progTimer = null;
  progBar.style.width = '0%'; progBar.style.display = 'none';
  playBtn.textContent = '▶ 自動播放'; playBtn.classList.remove('playing');
}
function updateProgress() {
  progBar.style.width = Math.min(((Date.now() - progStart) / autoSpeed) * 100, 100) + '%';
}
function autoAdvance() {
  const isLast = iIdx >= SESSIONS[sIdx].images.length - 1;
  if (isLast && !autoLoop) { stopAutoplay(); return; }
  showImage(sIdx, iIdx + 1);
}
function resetAutoTimer() {
  if (!autoTimer) return;
  clearInterval(autoTimer); clearInterval(progTimer);
  progStart = Date.now();
  autoTimer = setInterval(autoAdvance, autoSpeed);
  progTimer = setInterval(updateProgress, 50);
  progBar.style.width = '0%';
}

playBtn.addEventListener('click', () => autoTimer ? stopAutoplay() : startAutoplay());
ddToggle.addEventListener('click', e => { e.stopPropagation(); ddMenu.classList.toggle('open'); });
document.addEventListener('click', () => ddMenu.classList.remove('open'));
ddMenu.addEventListener('click', e => e.stopPropagation());
document.querySelectorAll('.dd-speed').forEach(el => {
  el.addEventListener('click', () => {
    autoSpeed = parseInt(el.dataset.ms);
    document.querySelectorAll('.dd-speed').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    if (autoTimer) { clearInterval(autoTimer); autoTimer = setInterval(autoAdvance, autoSpeed); progStart = Date.now(); }
  });
});
loopItem.addEventListener('click', () => { autoLoop = !autoLoop; loopItem.classList.toggle('active', autoLoop); });
</script>
